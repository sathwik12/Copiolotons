apiVersion: apps/v1
kind: Deployment
metadata:
  name: survey-app-deployment
  namespace: prod
spec:
  replicas: 2                # Maintain 2 pods for high availability
  selector:                  
    matchLabels:
      app: survey            # Deployment watches pods with this label
  template:                  
    metadata:
      labels:
        app: survey          # MUST match the selector above
    spec:
      # ADD THIS SECTION: It tells K8s to make the volume writable by user 1000
      securityContext:
        fsGroup: 1000
      containers:
      - name: survey-container
        image: hansyy/survey-app:v6
        ports:
        - containerPort: 8080
        # --- STORAGE ADDITION START ---
        volumeMounts:
        - name: survey-storage-volume
          mountPath: /app/data # This matches where your app saves its DB/logs
        # --- STORAGE ADDITION END ---
        
        # --- RESOURCE LIMITS (Step 13) ---
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
            
        # --- HEALTH PROBES (Step 14) ---
        # Readiness: Checks if the app is ready for users
        readinessProbe:
          httpGet:
            path: /          
            port: 8080
          initialDelaySeconds: 25  # Gives Spring Boot 25s to load
          periodSeconds: 5
        
        # Liveness: Checks if the app is still alive or frozen
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 45  # Waits longer before deciding it's "dead"
          periodSeconds: 10

        env:
        # 1. Externalized Database URL from ConfigMap
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: survey-app-config
              key: DB_URL
        
        # 2. Externalized Driver Class from ConfigMap
        - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
          valueFrom:
            configMapKeyRef:
              name: survey-app-config
              key: DB_DRIVER

        # 3. Environment Identifier from ConfigMap
        - name: APP_ENV_LABEL
          valueFrom:
            configMapKeyRef:
              name: survey-app-config
              key: APP_ENV

        # 4. SECURE: Database Password from Secret
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: survey-app-secret
              key: DB_PASSWORD
      
      # VOLUMES are defined here at the Pod Level
      volumes:
      - name: survey-storage-volume
        persistentVolumeClaim:
          claimName: survey-pvc # This must match the name in pvc.yaml
