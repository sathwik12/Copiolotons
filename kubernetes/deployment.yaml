apiVersion: apps/v1
kind: Deployment
metadata:
  name: survey-app-deployment
  namespace: prod
spec:
  replicas: 1                # Scale to 1 for initial persistent testing
  selector:                  
    matchLabels:
      app: survey            # Deployment watches pods with this label
  template:                  
    metadata:
      labels:
        app: survey          # MUST match the selector above
    spec:
      # ADD THIS SECTION: It tells K8s to make the volume writable by user 1000
      securityContext:
        fsGroup: 1000
      containers:
      - name: survey-container
        image: hansyy/survey-app:v6
        ports:
        - containerPort: 8080
        
        # --- NEW: STORAGE VERIFICATION HOOK ---
        # This proves the disk is working by writing a timestamp on every start
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "echo 'Pod started at $(date)' >> /app/data/pod_history.txt"]

        # --- STORAGE MOUNT (Step 16) ---
        volumeMounts:
        - name: survey-storage-volume
          mountPath: /app/data # This matches where your app saves its DB/logs
        
        # --- RESOURCE LIMITS (Step 13) ---
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
            
        # --- HEALTH PROBES (Step 14) ---
        readinessProbe:
          httpGet:
            path: /          
            port: 8080
          initialDelaySeconds: 20  # Gives Spring Boot time to load
          periodSeconds: 10
        
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30  # Waits longer before deciding it's "dead"
          periodSeconds: 15

        env:
        # 1. Externalized Database URL from ConfigMap
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: survey-app-config
              key: DB_URL
        
        # 2. Externalized Driver Class from ConfigMap
        - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
          valueFrom:
            configMapKeyRef:
              name: survey-app-config
              key: DB_DRIVER

        # 3. Environment Identifier from ConfigMap
        - name: APP_ENV_LABEL
          valueFrom:
            configMapKeyRef:
              name: survey-app-config
              key: APP_ENV
        
        # --- HIBERNATE & DIALECT SETTINGS (Step 16 Troubleshooting) ---
        - name: SPRING_JPA_DATABASE_PLATFORM
          value: "org.hibernate.dialect.H2Dialect"
        - name: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
          value: "org.hibernate.dialect.H2Dialect"
        - name: SPRING_JPA_HIBERNATE_DDL_AUTO
          value: "update"

        # 4. SECURE: Database Password from Secret
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: survey-app-secret
              key: DB_PASSWORD
      
      # --- VOLUMES DEFINITION (Step 16) ---
      volumes:
      - name: survey-storage-volume
        persistentVolumeClaim:
          claimName: survey-pvc # This must match the name in pvc.yaml
