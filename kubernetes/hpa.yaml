apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: survey-app-hpa
  namespace: prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: survey-app-deployment # Must match your Deployment name
  minReplicas: 2
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Scale up if CPU goes over 50%
